version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "nerjs"
    labels:
      - "dependencies"
      - "bot"
    target-branch: "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions-toolkit:
        patterns:
          - "@actions/*"

      yaml:
        patterns:
          - "js-yaml"
          - "@types/js-yaml"

      infra:
        patterns:
          - "typescript"
          - "@types/node"
          - "jest"
          - "ts-jest"
          - "@types/jest"
          - "eslint"
          - "@typescript-eslint/*"
          - "eslint-config-prettier"
          - "eslint-plugin-prettier"
          - "prettier"

      ncc:
        patterns:
          - "@vercel/ncc"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "nerjs"
    labels:
      - "dependencies"
      - "bot"
      - "github-actions"
    target-branch: "dependencies"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
